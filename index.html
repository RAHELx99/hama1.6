<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Dear BoBo </title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            background: #05000a; 
            overflow: hidden; 
            font-family: 'Playfair Display', serif;
            cursor: pointer;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #content-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .heart-text-container {
            position: absolute;
            top: calc(50% - 40px); 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px; 
            height: 300px;
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        .inside-text {
            position: absolute;
            font-family: 'Dancing Script', cursive;
            font-weight: bold;
            color: #ffffff; 
            text-shadow: 2px 2px 0px #ff1493, 0 0 15px #ff007f;
            white-space: nowrap;
        }

        .txt-happy { top: 25%; left: 10%; font-size: 2.2rem; transform: rotate(-15deg); }
        .txt-birthday { top: 25%; right: 10%; font-size: 2.2rem; transform: rotate(15deg); }
        .txt-name { top: 55%; left: 50%; transform: translate(-50%, -50%); font-size: 4.5rem; color: #fff0f5; }

        .split-msg {
            position: absolute;
            bottom: 15%; 
            width: 380px; 
            opacity: 0;
            transform: translateY(30px);
            transition: all 2.5s ease-out;
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.6;
            color: #FFB6C1; 
            text-shadow: 0 0 5px #FF69B4, 0 0 10px #C71585;
            text-align: left; 
        }

        .msg-left { left: 3%; }
        .msg-right { right: 3%; }
        .visible { opacity: 1 !important; transform: translateY(0) !important; }

        /* ئاگادارکردنەوە بۆ مۆسیقا */
        #music-note {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(255, 20, 147, 0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 100;
        }
    </style>
</head>
<body onclick="startMusic()">

    <div id="music-note">Tap anywhere for Music 🎵</div>

    <audio id="myAudio" loop>
        <source src=https://files.catbox.moe/e1ddyx.mp3 type="audio/mpeg">
    </audio>

    <canvas id="canvas"></canvas>
    
    <div id="content-wrapper">
        <div class="heart-text-container" id="heart-text">
            <span class="inside-text txt-happy">Happy</span>
            <span class="inside-text txt-name">BoBo</span>
            <span class="inside-text txt-birthday">Birthday</span>
        </div>
        <div class="split-msg msg-left" id="msg-left">
            <p>I hope this year is full of success and happiness for you.</p>
            <p>May your heart always be peaceful and filled with hope.</p>
        </div>
        <div class="split-msg msg-right" id="msg-right">
            <p>May all your wishes come true one by one,</p>
            <p>and may each new day bring you achievements and beautiful smiles. ✨</p>
        </div>
    </div>

    <script>
        // فەنکشن بۆ دەستپێکردنی مۆسیقا
        function startMusic() {
            const audio = document.getElementById("myAudio");
            audio.play();
            document.getElementById("music-note").style.display = "none";
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const heartColors = ['#FF1493', '#FF69B4', '#FF007F', '#FFB6C1'];
        const starColor = '#FFFFFF';
        let fireworks = [];
        let particles = [];
        let heartPoints = [];
        let phase = 'fireworks'; 
        let tick = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function initHeart() {
            heartPoints = [];
            const r = 17; 
            const centerY = (height / 2) - 40; 
            for (let i = 0; i < Math.PI * 2; i += 0.04) { 
                const x = 16 * Math.pow(Math.sin(i), 3);
                const y = -(13 * Math.cos(i) - 5 * Math.cos(2 * i) - 2 * Math.cos(3 * i) - Math.cos(4 * i));
                heartPoints.push({ x: (x * r) + width / 2, y: (y * r) + centerY });
            }
        }

        class Particle {
            constructor(x, y, type) {
                this.type = type; 
                this.color = (type === 'star') ? starColor : heartColors[Math.floor(Math.random() * heartColors.length)];
                if (type === 'star') {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.2;
                    this.vy = (Math.random() - 0.5) * 0.2;
                    this.size = Math.random() * 1.5;
                } else {
                    this.x = x; this.y = y;
                    this.vx = (Math.random() - 0.5) * 4;
                    this.vy = (Math.random() - 0.5) * 4;
                    this.size = Math.random() * 2 + 1.5; 
                    this.targetIndex = Math.floor(Math.random() * heartPoints.length);
                }
                this.friction = 0.95;
                this.blinkSpeed = 0.02 + Math.random() * 0.04;
                this.alpha = Math.random();
            }
            update() {
                this.alpha += this.blinkSpeed;
                if (this.alpha >= 1) { this.alpha = 1; this.blinkSpeed *= -1; } 
                else if (this.alpha <= 0.3) { this.alpha = 0.3; this.blinkSpeed *= -1; }
                if (this.type === 'star') {
                    this.x += this.vx; this.y += this.vy;
                    if(this.x < 0) this.x = width; if(this.x > width) this.x = 0;
                    if(this.y < 0) this.y = height; if(this.y > height) this.y = 0;
                } else {
                    if (phase === 'fireworks' || (Math.abs(this.vx) > 0.2)) {
                        this.x += this.vx; this.y += this.vy;
                        this.vx *= this.friction; this.vy *= this.friction;
                    }
                    if (phase === 'morph' && Math.abs(this.vx) <= 0.2) {
                        const target = heartPoints[this.targetIndex];
                        if (target) {
                            this.x += (target.x - this.x) * 0.06;
                            this.y += (target.y - this.y) * 0.06;
                        }
                    }
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha; 
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function explode(x, y, type) {
            const count = (type === 'heart') ? 100 : 40; 
            for (let i = 0; i < count; i++) particles.push(new Particle(x, y, type));
        }

        class Firework {
            constructor() {
                this.x = Math.random() * width;
                this.y = height;
                this.targetY = Math.random() * (height / 2.5) + 50;
                this.speed = 7;
                this.dead = false;
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    this.dead = true;
                    explode(this.x, this.y, 'heart');
                }
            }
            draw() {
                ctx.fillStyle = heartColors[0];
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(5, 0, 10, 0.2)'; 
            ctx.fillRect(0, 0, width, height);
            tick++;
            if (phase === 'fireworks') {
                if (tick % 20 === 0) fireworks.push(new Firework()); 
                if (tick > 220) { phase = 'morph'; initHeart(); }
            }
            fireworks.forEach((fw, i) => { fw.update(); fw.draw(); if (fw.dead) fireworks.splice(i, 1); });
            particles.forEach(p => { p.update(); p.draw(); });
            if (phase === 'morph' && tick > 280) {
                document.getElementById('heart-text').style.opacity = 1;
                setTimeout(() => { 
                    document.getElementById('msg-left').classList.add('visible'); 
                    document.getElementById('msg-right').classList.add('visible'); 
                }, 1000);
            }
            requestAnimationFrame(animate);
        }
        for(let i=0; i<60; i++) particles.push(new Particle(0,0,'star'));
        animate();
    </script>
</body>

</html>
